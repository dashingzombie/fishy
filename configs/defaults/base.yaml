seed: 42

data:
  dataset_format: fish_pickle
  metadata_dir: "../data"
  labels_json: "label_train.json"
  all_classes_pickle: "all_classes.pkl"
  split_dir: "splits"
  split_files:
    train: "train.pkl"
    test: "test.pkl"
    unseen: "unseen.pkl"

  # Paths stored in the pickle files are filenames. All supplied train, test,
  # and unseen images share the same directory under root_dir.
  root_dir: "../data"
  image_dirs:
    train: "images"
    test: "images"
    unseen: "images"
  image_col: "image_path"
  group_col: "image_id"
  target_col: "species_label"
  mask_col: null
  validate_images: false
  crop_to_foreground: false
  crop_pad: 0.0

  target_cols:
    genus: "genus"
    species: "species_label"
  split_target_col: "__taxon_for_split__"

preprocessing:
  image_size: 224
  normalisation:
    enabled: true
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

augmentation:
  enabled: true
  horizontal_flip: {enabled: true, probability: 0.5}
  vertical_flip: {enabled: false, probability: 0.0}
  rotation: {enabled: true, degrees: 20}

split:
  strategy: "long_tail"
  test_size: 0.10
  val_size: 0.15
  use_predefined_splits: false
  predefined_split_dir: "."
  save_splits: false

model:
  name: "efficientnet_b0"
  provider: "auto"
  checkpoint_path: null
  pretrained: true
  freeze_backbone: false
  species_classifier:
    type: linear
    initial_scale: 20.0
    learnable_scale: true
    maximum_scale: 100.0
  prototype_classifier:
    enabled: false
    update: static
    momentum: 0.99
    scale: 20.0
    fusion:
      enabled: true
      mode: fixed
      learned_weight: 0.5
      prototype_strength: 10.0
  dual_species_classifier:
    enabled: false
    classifier_type: cosine
    inference:
      mode: fused
      natural_weight: 0.5
      frequency_dependent: false

training:
  mode: "multitask"
  epochs: 200
  batch_size: 512
  eval_batch_size: 1024
  lr: 0.0003
  weight_decay: 0.0001
  use_amp: true
  amp_dtype: bfloat16
  num_workers: 16
  persistent_workers: true
  val_interval: 5
  optimizer:
    name: "adamw"
    fused: true
  compile:
    enabled: false
    mode: default
  sampling:
    strategy: "random"
  logit_adjustment:
    enabled: false
    task: "species"
    tau: 1.0
  distributed:
    enabled: false
    backend: "nccl"
    timeout_minutes: 120
  class_weight: false
  class_weighting:
    basis: "samples"
    method: "inverse_frequency"
    beta: 0.9999
  dual_species_classifier:
    natural_loss_weight: 1.0
    balanced_loss_weight: 1.0
    balanced_method: logit_adjustment
    tau: 1.0

long_tail:
  # Head means >10 labeled samples; tail means <=10.
  head_min_samples: 11
  staged_training:
    enabled: true
    stage2_epochs: 20
    head_replay_fraction: 0.25
    classifier_initialisation: keep
    trainable_scope: full_model
    val_interval: 5

fine_tuning:
  # Resolution upgrades are separate runs resumed from a 224 px checkpoint.
  enabled: false
  checkpoint_path: null
  reset_optimizer: true

multi_task:
  loss_weights:
    genus: 0.5
    species: 1.0
  normalize_loss_by_active_tasks: true
  # Overall species top-1 accuracy defines the best checkpoint.
  selection_metric: "species_accuracy"
  hierarchy_loss:
    enabled: true
    parent_task: "genus"
    child_task: "species"
    weight: 0.2
  hierarchical_contrastive:
    enabled: false
    weight: 0.05
    temperature: 0.1
    same_species_weight: 1.0
    same_genus_weight: 0.25
    projection_dim: 256
    use_two_views: true
  balanced_contrastive:
    enabled: false
    weight: 0.1
    temperature: 0.1
    projection_dim: 256
    include_class_prototypes: true
    class_average: true

early_stopping:
  enabled: true
  monitor: "species_accuracy"
  mode: "max"
  patience: 5
  min_delta: 0.0001

inference:
  enabled: true
  splits: ["test", "unseen"]
  enforce_hierarchy: true
  hierarchy_genus_weight: 1.0
  taxonomic_minimum_risk:
    enabled: false

wandb:
  enabled: true
  project: "fish-genus-species"
  entity: null
  group: null
  name: null
  mode: online
  job_type: train
  tags: [fish, genus, species, class_weighted]
  save_code: true
  log_model: false

output:
  out_dir: "outputs"

cache:
  enabled: true
  dir: "cache/images"
  root_dir_cache: "../data"
  format: "jpg"
  rebuild: false
  num_workers: 6

experiment:
  type: standard

input_condition:
  enabled: false
  name: original
  feature: baseline
  transform: original
  strength: 0.0
  parameters: {}

evaluation:
  taxonomic_distance:
    enabled: false
    same_species_cost: 0.0
    same_genus_cost: 1.0
    different_genus_cost: 2.0
  test_conditions:
    enabled: false
    conditions: []
    evaluate_original_training: false
  condition_matrix:
    enabled: false
    conditions: []
    write_reports: true

sweep:
  enabled: false
  parameters: {}

test_cue_suppression:
  enabled: false

matched_condition_training:
  enabled: false

condition_matrix_evaluation:
  enabled: false
